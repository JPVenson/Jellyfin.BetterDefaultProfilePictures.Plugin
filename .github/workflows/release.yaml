name: '🚀 Build and Release Plugin'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    name: Build, Package, and Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      zip_name: ${{ steps.package.outputs.zip_name }}
      checksum: ${{ steps.package.outputs.checksum }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Strip leading 'v' from the tag (v1.0.0.0 → 1.0.0.0)
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.Template.sln

      - name: Publish in Release mode
        run: |
          dotnet publish Jellyfin.Plugin.Template/Jellyfin.Plugin.Template.csproj \
            --configuration Release \
            --no-restore \
            --output artifacts \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:AssemblyVersion=${{ steps.version.outputs.version }} \
            -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Create plugin ZIP
        id: package
        run: |
          ARTIFACT_DIR="artifacts"

          ZIP_NAME="jellyfin-plugin-betterdefaultprofilepictures_${{ steps.version.outputs.version }}.zip"
          (cd "${ARTIFACT_DIR}" && zip -r "../${ZIP_NAME}" .)

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_path=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

          # Compute MD5 checksum (used in Jellyfin plugin manifest)
          MD5=$(md5sum "${ZIP_NAME}" | awk '{print $1}')
          echo "checksum=${MD5}" >> "$GITHUB_OUTPUT"

          FILE_SIZE=$(stat -c%s "${ZIP_NAME}")
          echo "file_size=${FILE_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: 'v${{ steps.version.outputs.version }}'
          generateReleaseNotes: true
          artifacts: ${{ steps.package.outputs.zip_path }}
          artifactContentType: application/zip
          allowUpdates: true

  update-manifest:
    name: Update manifest.json
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      # Always check out the default branch so the manifest PR is never based on a stale tag snapshot
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.repository.default_branch || 'main' }}
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Fetch release artifact info
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          RELEASE_JSON=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}")

          ZIP_URL=$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | endswith(".zip"))] | first | .browser_download_url')
          ZIP_NAME=$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | endswith(".zip"))] | first | .name')

          if [ -z "$ZIP_URL" ] || [ "$ZIP_URL" = "null" ]; then
            echo "::error::No .zip asset found on release ${TAG}"
            exit 1
          fi

          wget -q -O /tmp/plugin.zip "$ZIP_URL"
          CHECKSUM=$(md5sum /tmp/plugin.zip | awk '{print $1}')

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip_url=${ZIP_URL}" >> "$GITHUB_OUTPUT"
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          python3 - <<'PYEOF'
import json, os
from datetime import datetime, timezone

version    = os.environ["VERSION"]
checksum   = os.environ["CHECKSUM"]
zip_name   = os.environ["ZIP_NAME"]
zip_url    = os.environ["ZIP_URL"]
timestamp  = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
repository = os.environ["GITHUB_REPOSITORY"]

manifest_path = "manifest.json"
with open(manifest_path) as f:
    manifest = json.load(f)

new_version = {
    "version": version,
    "changelog": f"See https://github.com/{repository}/releases/tag/v{version}",
    "targetAbi": "10.11.0.0",
    "sourceUrl": zip_url,
    "checksum": checksum,
    "timestamp": timestamp,
    "filename": zip_name
}

# Prepend new version (most recent first) and de-duplicate
existing = manifest[0].get("versions", [])
existing = [v for v in existing if v["version"] != version]
manifest[0]["versions"] = [new_version] + existing

with open(manifest_path, "w") as f:
    json.dump(manifest, f, indent=2)
    f.write("\n")

print(f"manifest.json updated with version {version}")
PYEOF
        env:
          VERSION: ${{ steps.release.outputs.version }}
          CHECKSUM: ${{ steps.release.outputs.checksum }}
          ZIP_NAME: ${{ steps.release.outputs.zip_name }}
          ZIP_URL: ${{ steps.release.outputs.zip_url }}

      - name: Create Pull Request to update manifest
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: manifest.json
          branch: 'manifest/update-${{ steps.release.outputs.version }}'
          base: ${{ github.event.repository.default_branch || 'main' }}
          commit-message: 'manifest: add version ${{ steps.release.outputs.version }}'
          title: '[manifest] Add version ${{ steps.release.outputs.version }}'
          body: |
            Automated manifest update for release **v${{ steps.release.outputs.version }}**.

            - Checksum (MD5): `${{ steps.release.outputs.checksum }}`
            - Download: [${{ steps.release.outputs.zip_name }}](${{ steps.release.outputs.zip_url }})
          labels: manifest
          delete-branch: true
